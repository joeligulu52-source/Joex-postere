<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bulanga Secondary School - Prefect Election</title>
    <link href="https://fonts.googleapis.com/css2?family=Lato&display=swap" rel="stylesheet">
    <style>
        :root {
            --navy: #1a2a5e;
            --blue: #2255a4;
            --sky: #5ba3d9;
            --light: #d6eaf8;
            --white: #ffffff;
            --gold: #f0c040;
            --shadow: 0 8px 32px rgba(26,42,94,0.18);
        }

        *, *::before, *::after {
            box-sizing: border-box;
        }

        body {
            font-family: 'Lato', sans-serif;
            background: linear-gradient(135deg, var(--light), var(--white));
            min-height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .voting-container {
            background: var(--white);
            padding: 2rem;
            border-radius: 15px;
            box-shadow: var(--shadow);
            width: 90%;
            max-width: 500px;
            text-align: center;
        }

        h1 { color: var(--navy); }

        .candidate {
            margin: 1rem 0;
            padding: 15px;
            border: 2px solid var(--light);
            border-radius: 10px;
            text-align: left;
            transition: 0.3s;
        }

        .candidate:hover { border-color: var(--blue); }

        button {
            background: var(--blue);
            color: white;
            padding: 12px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
            font-size: 1rem;
            margin-top: 10px;
        }

        button:hover { background: var(--navy); }
    </style>
</head>
<body>

    <div class="voting-container">
        <h1>Prefect Elections 2026</h1>
        <p>Please select your preferred candidate:</p>
        
        <form id="voteForm">
            <div class="candidate">
                <input type="radio" id="candidate1" name="candidate" value="Candidate A" required>
                <label for="candidate1">Candidate A - School Captain</label>
            </div>
            
            <div class="candidate">
                <input type="radio" id="candidate2" name="candidate" value="Candidate B" required>
                <label for="candidate2">Candidate B - School Captain</label>
            </div>

            <button type="submit">Submit My Vote</button>
        </form>
    </div>

</body>
</html>
